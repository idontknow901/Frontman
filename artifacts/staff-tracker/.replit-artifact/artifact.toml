kind = "web"
previewPath = "/"
title = "Staff Management System"
version = "1.0.0"
id = "artifacts/staff-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25219

[services.development]
run = "pnpm --filter @workspace/staff-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/staff-tracker", "run", "build" ]
publicDir = "artifacts/staff-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25219"
BASE_PATH = "/"
